[game]
hostname = "[RU] ✨ Exodus: Monolith [Frontier]"
desc = "✨ \"Exodus: Monolith\" - это проект режима Frontier построенный вокруг игрока и кораблей, эпичных корабельных сражений, а также имеющий простой и ясный набор правил.\nУ нас вы встретите:\n- ☄️ Блюспейс прыжки по карте\n- ⚔️ Мощная корабельная артиллерия\n- 📥 Авто-погрузчики боеприпасов\n- 🛡 Корабельные щиты\n- 💥 Коллизии шаттлов\n- 📜 Новый запоминающийся лор\n\nПовышенный ролевой отыгрыш поощряется, но строгих требований нет, просто соблюдайте правила\n\nПроект \"Исход\" давний проект, что вновь возродился. Сервер работает в сессионном формате, проводя раунды лишь по определённым дням.\nПрисоединяйтесь к нашему Discord, чтобы быть в курсе о времени сессий и обновлениях!"
lobbyenabled = true
role_timers = false
soft_max_players = 70

[hub]
advertise = 1
tags = "lang:ru, rp:med, region:eu_w"
hub_urls = "https://hub.spacestation14.com/,https://hub.singularity14.co.uk/"

[game.dynamic_roles]

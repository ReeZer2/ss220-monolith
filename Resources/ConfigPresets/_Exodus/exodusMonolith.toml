[chat]
motd = "Добро пожаловать на открытую сессию Space Exodus!\nРусская локализация неполная. Пожалуйста, сообщайте о багах.\nЕсли вам нужна помощь, то не стесняйтесь просить помощи в AHelp.\nВ нашем Discord доступны рендеры всех шаттлов.\nУ нас также открыт OOC канал для помощи по игровым механикам, избегайте его использования для общения.\nПриятной игры!"

